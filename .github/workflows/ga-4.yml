name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.ec2.outputs.public-ip }}
      hostname: ${{ steps.ec2.outputs.public-dns }}
    steps:
      - uses: actions/checkout@v4
      - id: ec2
        uses: ./.github/actions/provision-ec2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
          key-name: june2026
      - name: Show host details
        run: |
          echo "Public IP:  ${{ steps.ec2.outputs.public-ip }}"
          echo "Hostname:   ${{ steps.ec2.outputs.public-dns }}"

  deploy:
    needs: provision
    runs-on: ubuntu-latest
    env:
      PEM_DIR: ~/.ssh
      SSH_KEY_NAME: june2026.pem
      SSH_HOST: ${{ needs.provision.outputs.host }}
      SSH_USER: ubuntu
    steps:
      - uses: actions/checkout@v4
      - name: Show target host
        run: |
          echo "Deploying to IP:       $SSH_HOST"
          echo "Deploying to hostname: ${{ needs.provision.outputs.hostname }}"
      - run: pip install paramiko
      - run: mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/june2026.pem && chmod 600 ~/.ssh/june2026.pem
      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i ~/.ssh/june2026.pem ubuntu@"$SSH_HOST" true && exit 0
            echo "SSH not ready yet ($i/30), retrying..."
            sleep 10
          done
          echo "SSH never became ready" && exit 1
      - run: python deploy.py
