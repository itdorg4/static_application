name: 'Provision EC2'
description: 'Create (idempotently) an Ubuntu EC2 instance with SSH/HTTP/HTTPS enabled and return its public IP'

inputs:
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  aws-region:
    description: 'AWS region'
    required: false
    default: 'ap-south-1'
  key-name:
    description: 'Name of an existing EC2 key pair to attach to the instance'
    required: true
  instance-name:
    description: 'Name tag used to find/create the instance (acts as the idempotency key)'
    required: false
    default: 'june2026-static-site'
  instance-type:
    description: 'EC2 instance type'
    required: false
    default: 't3.micro'

outputs:
  public-ip:
    description: 'Public IPv4 address of the instance'
    value: ${{ steps.ec2.outputs.public_ip }}
  public-dns:
    description: 'Public DNS hostname of the instance'
    value: ${{ steps.ec2.outputs.public_dns }}
  instance-id:
    description: 'EC2 instance ID'
    value: ${{ steps.ec2.outputs.instance_id }}

runs:
  using: 'composite'
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Provision EC2 instance
      id: ec2
      shell: bash
      env:
        INSTANCE_NAME: ${{ inputs.instance-name }}
        INSTANCE_TYPE: ${{ inputs.instance-type }}
        KEY_NAME: ${{ inputs.key-name }}
      run: |
        set -euo pipefail
        SG_NAME="${INSTANCE_NAME}-sg"

        # 1. Ensure a security group exists with SSH/HTTP/HTTPS open (in the default VPC)
        VPC_ID=$(aws ec2 describe-vpcs \
          --filters Name=isDefault,Values=true \
          --query 'Vpcs[0].VpcId' --output text)

        SG_ID=$(aws ec2 describe-security-groups \
          --filters Name=group-name,Values="$SG_NAME" Name=vpc-id,Values="$VPC_ID" \
          --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "None")

        if [ "$SG_ID" = "None" ] || [ -z "$SG_ID" ]; then
          echo "Creating security group $SG_NAME ..."
          SG_ID=$(aws ec2 create-security-group \
            --group-name "$SG_NAME" \
            --description "SSH/HTTP/HTTPS for $INSTANCE_NAME" \
            --vpc-id "$VPC_ID" \
            --query 'GroupId' --output text)
        fi

        # Self-healing: (re)authorize SSH/HTTP/HTTPS every run, ignoring rules
        # that already exist (InvalidPermission.Duplicate). This re-adds any
        # rule that was manually removed without erroring on the existing ones.
        for port in 22 80 443; do
          if err=$(aws ec2 authorize-security-group-ingress \
                --group-id "$SG_ID" --protocol tcp --port "$port" --cidr 0.0.0.0/0 2>&1); then
            echo "Added ingress rule for port $port"
          elif echo "$err" | grep -q "InvalidPermission.Duplicate"; then
            echo "Ingress rule for port $port already present"
          else
            echo "$err" >&2
            exit 1
          fi
        done
        echo "Security group: $SG_ID"

        # 2. Reuse a running/pending instance if one already exists, else create it
        IID=$(aws ec2 describe-instances \
          --filters Name=tag:Name,Values="$INSTANCE_NAME" \
                    Name=instance-state-name,Values=running,pending \
          --query 'Reservations[0].Instances[0].InstanceId' --output text)

        if [ "$IID" = "None" ] || [ -z "$IID" ]; then
          echo "Launching new instance ..."
          AMI=$(aws ssm get-parameters \
            --names /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id \
            --query 'Parameters[0].Value' --output text)
          IID=$(aws ec2 run-instances \
            --image-id "$AMI" \
            --instance-type "$INSTANCE_TYPE" \
            --key-name "$KEY_NAME" \
            --security-group-ids "$SG_ID" \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=$INSTANCE_NAME}]" \
            --query 'Instances[0].InstanceId' --output text)
        else
          echo "Reusing existing instance $IID"
        fi

        # 3. Wait until it's running and grab its public IP + DNS hostname
        aws ec2 wait instance-running --instance-ids "$IID"
        read -r IP DNS < <(aws ec2 describe-instances \
          --instance-ids "$IID" \
          --query 'Reservations[0].Instances[0].[PublicIpAddress,PublicDnsName]' \
          --output text)

        echo "instance_id=$IID"  >> "$GITHUB_OUTPUT"
        echo "public_ip=$IP"     >> "$GITHUB_OUTPUT"
        echo "public_dns=$DNS"   >> "$GITHUB_OUTPUT"
        echo "Instance $IID is running"
        echo "  Public IP:   $IP"
        echo "  Public DNS:  $DNS"
